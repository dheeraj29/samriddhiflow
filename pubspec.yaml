name: samriddhi_flow
description: Samriddhi Flow - Premium personal finance and smart budgeting PWA.
publish_to: 'none'
version: 4.3.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^3.3.1
  
  # Local Storage
  
  # Utilities
  intl: ^0.20.2
  clock: ^1.1.2
  uuid: ^4.2.2
  # google_fonts: ^7.0.2 # Removed (Bundled Outfit)
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  # path_provider: ^2.1.2 # Often included in flutter sdk or via hive_flutter implicitly, but good to have explicit if needed for non-web logic
  
  # Data Handling

  file_picker: ^11.0.2
  web: ^1.1.1
  archive: ^4.0.9
  
  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_storage: ^13.2.0
  # google_sign_in: ^6.2.2
  
  # Auth Utils
  
  
  # UI/Charts
  http: ^1.6.0
  fl_chart: ^1.2.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  cloud_firestore: ^6.2.0
  connectivity_plus: ^7.1.1
  cupertino_icons: ^1.0.9
  encrypt: ^5.0.3
  crypto: ^3.0.7
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  hive_ce_generator: ^1.11.1

  mocktail: ^1.0.4
  mockito: ^5.6.4
  path: ^1.9.1

  path_provider_platform_interface: any
  plugin_platform_interface: any
  analyzer: ^10.0.1
flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
  fonts:
    - family: MaterialSymbolsOutlined
      fonts:
        - asset: assets/fonts/MaterialSymbolsOutlined.ttf
    - family: AppFont
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf

